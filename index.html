    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Atelier fonctionne pour quel type d'artisan ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Atelier est conçu pour les artisans du second oeuvre BTP qui dirigent une structure de 1 à 15 personnes : électricité, plomberie, CVC, menuiserie, tôlerie, peinture, plâtrerie, plaquiste, maçonnerie et paysagisme."
          }
        },
        {
          "@type": "Question",
          "name": "Est-ce que je dois installer quelque chose sur mon téléphone ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Non. Atelier fonctionne depuis votre navigateur sur téléphone, tablette ou ordinateur. Pas d'application à télécharger, pas de logiciel à installer."
          }
        },
        {
          "@type": "Question",
          "name": "Combien de temps pour être opérationnel ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "48 heures en moyenne. On démarre par un appel de setup, on installe votre environnement. Vous vous connectez et vous prenez la main."
          }
        },
        {
          "@type": "Question",
          "name": "La facturation électronique est-elle obligatoire pour les artisans en 2026 ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oui. À partir du 1er septembre 2026, toutes les entreprises françaises, y compris les artisans et micro-entrepreneurs, doivent pouvoir recevoir des factures électroniques au format structuré. Atelier génère nativement le format Factur-X requis."
          }
        },
        {
          "@type": "Question",
          "name": "Atelier est-il une alternative à Obat, Tolteck ou Batigest ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oui. Si vous cherchez une alternative à Obat, Tolteck, Batappli ou Sage Batigest, Atelier couvre les mêmes usages (devis, factures, chantiers) mais avec l'IA embarquée au cœur de l'outil pour automatiser votre quotidien. Contrairement à ces solutions, Atelier propose aussi une offre sans abonnement donnant accès à toutes les fonctionnalités de l'application, et une infrastructure dédiée, isolée, qui vous appartient."
          }
        },
        {
          "@type": "Question",
          "name": "Comment fonctionnent les relances automatiques ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Chaque matin, Atelier identifie les factures en retard et les devis sans réponse. Les relances sont rédigées automatiquement et envoyées par email selon les échéances définies."
          }
        },
        {
          "@type": "Question",
          "name": "Que se passe-t-il si je dépasse mon quota mensuel ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "La fonctionnalité est mise en pause jusqu'au renouvellement du quota le 1er du mois suivant, avec un message clair dans l'application. Le passage à l'offre supérieure se fait en 24h."
          }
        }
      ]
    }
    </script>
